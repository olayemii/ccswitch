name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_call: # so the release workflow can gate publishing on this

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # package.json declares engines.node >= 18 and tsup targets node18, so
        # verify the oldest supported runtime alongside current.
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # The published binary is a bundle, not the source the tests exercise —
      # the 0.2.0 --version bug survived a green suite for exactly that reason.
      - name: Verify built binary reports the package version
        run: |
          expected="$(node -p 'require("./package.json").version')"
          actual="$(node dist/bin.js --version)"
          if [ "$expected" != "$actual" ]; then
            echo "Built binary reports '$actual', package.json says '$expected'." >&2
            exit 1
          fi
          echo "Built binary reports $actual"
